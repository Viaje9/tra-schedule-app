<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d4d61"/>
      <stop offset="100%" style="stop-color:#2d3a4a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e5a835"/>
      <stop offset="100%" style="stop-color:#c8932e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Train Body -->
  <rect x="96" y="180" width="320" height="160" rx="24" fill="#ffffff"/>

  <!-- Train Front (curved) -->
  <path d="M96 220 Q96 180 136 180 L96 180 Z" fill="#ffffff"/>

  <!-- Window Band -->
  <rect x="96" y="200" width="320" height="60" fill="url(#goldGrad)"/>

  <!-- Windows -->
  <rect x="130" y="210" width="50" height="40" rx="6" fill="#2d3a4a"/>
  <rect x="200" y="210" width="50" height="40" rx="6" fill="#2d3a4a"/>
  <rect x="270" y="210" width="50" height="40" rx="6" fill="#2d3a4a"/>
  <rect x="340" y="210" width="50" height="40" rx="6" fill="#2d3a4a"/>

  <!-- Front Light -->
  <circle cx="120" cy="300" r="16" fill="url(#goldGrad)"/>

  <!-- Wheels -->
  <circle cx="160" cy="360" r="32" fill="#1f2937"/>
  <circle cx="160" cy="360" r="16" fill="#6b7280"/>
  <circle cx="280" cy="360" r="32" fill="#1f2937"/>
  <circle cx="280" cy="360" r="16" fill="#6b7280"/>
  <circle cx="360" cy="360" r="32" fill="#1f2937"/>
  <circle cx="360" cy="360" r="16" fill="#6b7280"/>

  <!-- Rail -->
  <rect x="60" y="388" width="392" height="8" rx="4" fill="#6b7280"/>

  <!-- Clock symbol on train -->
  <circle cx="440" cy="140" r="36" fill="#ffffff" stroke="url(#goldGrad)" stroke-width="6"/>
  <line x1="440" y1="140" x2="440" y2="118" stroke="#2d3a4a" stroke-width="4" stroke-linecap="round"/>
  <line x1="440" y1="140" x2="456" y2="148" stroke="#2d3a4a" stroke-width="4" stroke-linecap="round"/>
  <circle cx="440" cy="140" r="4" fill="#e5a835"/>
</svg>
